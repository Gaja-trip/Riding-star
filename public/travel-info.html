<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riding-star 정보</title>
    <link rel="stylesheet" href="/styles.css?v=text-menu-nav">
  </head>
  <body class="home-body travel-body">
    <header class="home-nav">
      <a class="home-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
        <img class="site-logo-img" src="/assets/riding-star-logo-transparent.png" alt="라이딩스타 Riding Star">
      </a>
      <nav aria-label="주요 메뉴">
        <a class="active" href="/travel-info.html" aria-label="정보">정보</a>
        <a href="https://broad-script.vercel.app" aria-label="시나리오">시나리오</a>
        <a href="/archive.html" aria-label="회차보기">회차보기</a>
        <a href="/cast.html" aria-label="출연진">출연진</a>
      </nav>
    </header>

    <main class="travel-page-main">
      <section class="info-browser" aria-label="정보 사이트 미리보기">
        <aside class="info-site-panel" aria-label="사이트 연결">
          <div class="info-site-list">
            <article class="info-site-item active">
              <button class="info-site-button" type="button" data-title="bicycle-trip" data-url="https://bicycle-trip.vercel.app/" aria-pressed="true">bicycle-trip</button>
              <a class="info-site-open" href="https://bicycle-trip.vercel.app/" target="_blank" rel="noopener">열기</a>
            </article>

            <article class="info-site-item">
              <button class="info-site-button" type="button" data-title="bicycle-tripmap" data-url="https://bicycle-tripmap.vercel.app/" aria-pressed="false">bicycle-tripmap</button>
              <a class="info-site-open" href="https://bicycle-tripmap.vercel.app/" target="_blank" rel="noopener">열기</a>
            </article>

            <article class="info-site-item">
              <button class="info-site-button" type="button" data-title="bicycle-map" data-url="https://hopesound.github.io/bicycle-map/" aria-pressed="false">bicycle-map</button>
              <a class="info-site-open" href="https://hopesound.github.io/bicycle-map/" target="_blank" rel="noopener">열기</a>
            </article>

            <article class="info-site-item">
              <button class="info-site-button" type="button" data-title="tgj-test" data-url="https://tgj-test.vercel.app/" aria-pressed="false">tgj-test</button>
              <a class="info-site-open" href="https://tgj-test.vercel.app/" target="_blank" rel="noopener">열기</a>
            </article>
          </div>
        </aside>

        <section class="info-preview-stage" aria-label="선택한 사이트 화면">
          <div class="info-preview-head">
            <strong id="infoPreviewTitle">bicycle-trip</strong>
            <a id="infoPreviewOpen" class="button primary" href="https://bicycle-trip.vercel.app/" target="_blank" rel="noopener">열기</a>
          </div>
          <div class="info-preview-frame">
            <iframe id="infoPreviewFrame" title="bicycle-trip 메인 화면" src="https://bicycle-trip.vercel.app/" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </section>
      </section>
    </main>

    <script src="/travel-info.js?v=info-selector-preview"></script>
  </body>
</html>
