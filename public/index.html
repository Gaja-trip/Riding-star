<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riding-star</title>
    <link rel="stylesheet" href="/styles.css?v=info-menu-order">
  </head>
  <body class="home-body">
    <main class="poster-home" aria-label="Riding-star 메인">
      <section class="poster-stage" aria-label="Riding-star 방송 안내">
        <div class="poster-frame">
          <img src="/assets/riding-star-main.png" alt="자전거 토크쇼 Riding Star 방송 안내 포스터">

          <div class="poster-top-menu" aria-label="주요 바로가기">
            <a class="poster-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
              <img class="site-logo-img poster-logo-img" src="/assets/riding-star-logo-transparent.png" alt="라이딩스타 Riding Star">
            </a>
            <nav aria-label="상단 메뉴">
              <a href="https://bicycle-trip.vercel.app/" aria-label="종합정보">
                <img class="menu-label-img poster-menu-label-img" src="/assets/menu-info.svg?v=info-menu-order" alt="종합정보">
              </a>
              <a href="https://broad-script.vercel.app" aria-label="시나리오">
                <img class="menu-label-img poster-menu-label-img" src="/assets/menu-scenario.svg?v=transparent-menu" alt="시나리오">
              </a>
              <a href="/archive.html" aria-label="회차보기">
                <img class="menu-label-img poster-menu-label-img" src="/assets/menu-archive.svg?v=transparent-menu" alt="회차보기">
              </a>
              <a href="/cast.html" aria-label="출연진">
                <img class="menu-label-img poster-menu-label-img" src="/assets/menu-cast.svg?v=transparent-menu" alt="출연진">
              </a>
            </nav>
          </div>

          <a
            class="poster-radio-hotspot"
            href="https://bicycle-trip.vercel.app/"
            aria-label="라이딩 종합정보 페이지로 이동"
            title="라이딩 종합정보"
          ></a>
        </div>
      </section>
    </main>

    <script src="/home.js?v=poster-menu"></script>
  </body>
</html>
