<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riding-star</title>
    <link rel="stylesheet" href="/styles.css?v=hover-menu-glass">
  </head>
  <body class="home-body">
    <main class="poster-home" aria-label="Riding-star 메인">
      <section class="poster-stage" aria-label="Riding-star 방송 안내">
        <div class="poster-mobile-top" aria-label="모바일 상단 메뉴">
          <a class="poster-mobile-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
            <img class="site-logo-img poster-mobile-logo-img" src="/assets/riding-star-logo-transparent.png" alt="라이딩스타 Riding Star">
          </a>
          <nav class="poster-mobile-nav" aria-label="모바일 상단 바로가기">
            <a href="/travel-info.html">정보</a>
            <a href="https://broad-script.vercel.app">시나리오</a>
            <a href="/archive.html">회차보기</a>
            <a href="/cast.html">출연진</a>
          </nav>
        </div>

        <div class="poster-frame poster-sequence" data-sequence-label="Riding-star main sequence">
          <div class="poster-media-stack" aria-label="라이딩스타 메인 영상">
            <video class="poster-media-item poster-sequence-video is-active" src="/assets/main-sequence/riding-intro-01.mp4" muted playsinline preload="auto"></video>
            <video class="poster-media-item poster-sequence-video" src="/assets/main-sequence/riding-intro-02.mp4" muted playsinline preload="metadata"></video>
            <video class="poster-media-item poster-sequence-video" src="/assets/main-sequence/riding-intro-03.mp4" muted playsinline preload="metadata"></video>
            <video class="poster-media-item poster-sequence-video" src="/assets/main-sequence/riding-intro-04.mp4" muted playsinline preload="metadata"></video>
            <video class="poster-media-item poster-sequence-video" src="/assets/main-sequence/jeonju-community-radio-promo-draft.mp4" muted playsinline preload="metadata"></video>
          </div>
          <div class="poster-dynamic-shade" aria-hidden="true"></div>

          <div class="poster-top-menu" aria-label="주요 바로가기">
            <a class="poster-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
              <img class="site-logo-img poster-logo-img" src="/assets/riding-star-logo-transparent.png" alt="라이딩스타 Riding Star">
            </a>
            <div class="poster-menu-popover">
              <button class="poster-menu-trigger" type="button" aria-label="메뉴 열기" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
              </button>
              <nav class="poster-menu-panel" aria-label="상단 메뉴">
                <a href="/travel-info.html">정보</a>
                <a href="https://broad-script.vercel.app">시나리오</a>
                <a href="/archive.html">회차보기</a>
                <a href="/cast.html">출연진</a>
              </nav>
            </div>
          </div>

          <div class="poster-sequence-status" aria-hidden="true">
            <span class="poster-sequence-current">01</span>
            <span class="poster-sequence-line"><span></span></span>
            <span class="poster-sequence-total">05</span>
          </div>

          <button class="poster-replay-button" type="button" aria-label="영상 다시보기" title="영상 다시보기">↻</button>

          <a
            class="poster-radio-hotspot"
            href="/travel-info.html"
            aria-label="라이딩 정보 페이지로 이동"
            title="라이딩 정보"
          ></a>
        </div>

        <nav class="poster-mobile-bottom poster-mobile-nav" aria-label="모바일 하단 바로가기">
          <a href="/travel-info.html">정보</a>
          <a href="https://broad-script.vercel.app">시나리오</a>
          <a href="/archive.html">회차보기</a>
          <a href="/cast.html">출연진</a>
        </nav>
      </section>
    </main>

    <script src="/home.js?v=hover-menu-glass"></script>
  </body>
</html>
