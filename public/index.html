  <body class="home-body">
    <main class="poster-home" aria-label="Riding-star 메인">

          <div class="poster-top-menu" aria-label="주요 바로가기">
            <a class="poster-brand" href="/">
              <span class="brand-mark">RS</span>
              <span>Riding-star</span>

            <nav>

          <div class="poster-quick-panel" aria-label="Riding-star 메뉴">

            <div class="poster-actions">

              </a>

                <strong>출연진</strong>

              </a>
              <a class="poster-action" href="/archive.html">
                <strong>회차 보기</strong>
                <span><b id="episodeCount">0</b>개 회차 · 최근 <b id="latestDate">-</b></span>
              </a>
            </div>
          </div>
        </div>
      </section>

    <script src="/home.js?v=poster-menu"></script>
