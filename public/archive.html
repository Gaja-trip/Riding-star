<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riding-star 회차 찾기</title>
    <link rel="stylesheet" href="/styles.css?v=menu-label-images">
  </head>
  <body class="home-body archive-body">
    <header class="home-nav">
      <a class="home-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
        <img class="site-logo-img" src="/assets/riding-star-logo-transparent.png" alt="라이딩스타 Riding Star">
      </a>
      <nav aria-label="주요 메뉴">
        <a href="/" aria-label="홈">
          <img class="menu-label-img home-menu-label-img" src="/assets/menu-home.svg" alt="홈">
        </a>
        <a href="/cast.html" aria-label="출연진">
          <img class="menu-label-img home-menu-label-img" src="/assets/menu-cast.svg" alt="출연진">
        </a>
        <a class="active" href="/archive.html" aria-label="회차보기">
          <img class="menu-label-img home-menu-label-img" src="/assets/menu-archive.svg" alt="회차보기">
        </a>
        <a href="https://broad-script.vercel.app" target="_blank" rel="noopener" aria-label="시나리오">
          <img class="menu-label-img home-menu-label-img" src="/assets/menu-scenario.svg" alt="시나리오">
        </a>
      </nav>
    </header>

    <main class="archive-page-main">
      <section id="archive" class="archive-section" aria-label="회차별 방송 아카이브">
        <div class="archive-head">
          <div>
            <span class="status-chip">공개 아카이브</span>
            <h1>날짜별 회차 방송 내용</h1>
            <p>시나리오에 입력된 방송일을 기준으로 묶고, 방송일이 비어 있으면 녹음일로 연결합니다.</p>
          </div>
          <a class="button" href="https://broad-script.vercel.app" target="_blank" rel="noopener">새 회차 등록</a>
        </div>

        <div class="archive-tools">
          <label>
            <span>검색</span>
            <input id="archiveSearch" class="input" type="search" placeholder="제목, 게스트, 키워드">
          </label>
          <label>
            <span>년</span>
            <select id="yearFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
          <label>
            <span>월</span>
            <select id="monthFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
          <label>
            <span>일</span>
            <select id="dayFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
        </div>

        <div id="archiveList" class="archive-list">
          <p class="empty-preview">회차를 불러오는 중입니다.</p>
        </div>
      </section>
    </main>

    <script src="/archive.js"></script>
  </body>
</html>
