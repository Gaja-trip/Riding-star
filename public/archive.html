<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riding-star 회차 찾기</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="home-body">
    <header class="home-nav">
      <a class="home-brand" href="/" aria-label="Riding-star 메인페이지로 이동">
        <span class="riding-logo" aria-hidden="true">
          <span class="riding-logo-ko">라이딩</span>
          <span class="riding-logo-star">★</span>
          <span class="riding-logo-green">스타</span>
        </span>
      </a>
      <nav aria-label="주요 메뉴">
        <a href="/">홈</a>
        <a href="/cast.html">출연진</a>
        <a class="active" href="/archive.html">회차 찾기</a>
        <a href="https://broad-script.vercel.app" target="_blank" rel="noopener">시나리오 관리</a>
      </nav>
    </header>

    <main class="archive-page-main">
      <section id="archive" class="archive-section" aria-label="회차별 방송 아카이브">
        <div class="archive-head">
          <div>
            <span class="status-chip">공개 아카이브</span>
            <h1>회차별 방송 내용</h1>
            <p>등록된 회차는 읽기 전용 페이지에서 함께 확인할 수 있습니다.</p>
          </div>
          <a class="button" href="https://broad-script.vercel.app" target="_blank" rel="noopener">새 회차 등록</a>
        </div>

        <div class="archive-tools">
          <label>
            <span>검색</span>
            <input id="archiveSearch" class="input" type="search" placeholder="제목, 게스트, 키워드">
          </label>
          <label>
            <span>년</span>
            <select id="yearFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
          <label>
            <span>월</span>
            <select id="monthFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
          <label>
            <span>일</span>
            <select id="dayFilter" class="input">
              <option value="">전체</option>
            </select>
          </label>
        </div>

        <div id="archiveList" class="archive-list">
          <p class="empty-preview">회차를 불러오는 중입니다.</p>
        </div>
      </section>
    </main>

    <script src="/archive.js"></script>
  </body>
</html>
